<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clock Calendar</title>
<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    box-sizing: border-box;
    padding: 20px 10px;
}

#time {
    font-size: 72px;
    font-weight: bold;
    margin-top: 10px;
    line-height: 1;
}

#date {
    font-size: 24px;
    margin-top: 10px;
    margin-bottom: 20px;
}

#calendar-title {
    font-size: 28px;
    margin-bottom: 10px;
}

#calendar {
    width: 100%;
    max-width: 420px;
    border-collapse: collapse;
    table-layout: fixed;
}

#calendar th,
#calendar td {
    border: 1px solid #444;
    text-align: center;
    padding: 10px 0;
    font-size: 20px;
}

#calendar th {
    background: #111;
    color: #ccc;
}

.sun {
    color: #ff8080;
}

.sat {
    color: #7fb3ff;
}

.today {
    background: #ffffff;
    color: #000000;
    font-weight: bold;
    border-radius: 8px;
}

.other-month {
    color: #555;
}
</style>
</head>
<body>

<div id="time"></div>
<div id="date"></div>
<div id="calendar-title"></div>
<table id="calendar">
    <thead>
        <tr>
            <th class="sun">日</th>
            <th>月</th>
            <th>火</th>
            <th>水</th>
            <th>木</th>
            <th>金</th>
            <th class="sat">土</th>
        </tr>
    </thead>
    <tbody id="calendar-body"></tbody>
</table>

<script>
function updateClock() {
    const now = new Date();

    const time =
        String(now.getHours()).padStart(2, '0') + ":" +
        String(now.getMinutes()).padStart(2, '0') + ":" +
        String(now.getSeconds()).padStart(2, '0');

    const weekNames = ["日", "月", "火", "水", "木", "金", "土"];
    const date =
        now.getFullYear() + "年" +
        (now.getMonth() + 1) + "月" +
        now.getDate() + "日 (" + weekNames[now.getDay()] + ")";

    document.getElementById("time").textContent = time;
    document.getElementById("date").textContent = date;
}

function buildCalendar() {
    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();
    const today = now.getDate();

    document.getElementById("calendar-title").textContent =
        year + "年 " + (month + 1) + "月";

    const firstDay = new Date(year, month, 1).getDay();
    const lastDate = new Date(year, month + 1, 0).getDate();

    const tbody = document.getElementById("calendar-body");
    tbody.innerHTML = "";

    let dateNum = 1;

    for (let week = 0; week < 6; week++) {
        const tr = document.createElement("tr");

        for (let day = 0; day < 7; day++) {
            const td = document.createElement("td");

            if (week === 0 && day < firstDay) {
                td.textContent = "";
            } else if (dateNum > lastDate) {
                td.textContent = "";
            } else {
                td.textContent = dateNum;

                if (day === 0) td.classList.add("sun");
                if (day === 6) td.classList.add("sat");

                if (dateNum === today) {
                    td.classList.add("today");
                }

                dateNum++;
            }

            tr.appendChild(td);
        }

        tbody.appendChild(tr);

        if (dateNum > lastDate) {
            break;
        }
    }
}

updateClock();
buildCalendar();
setInterval(updateClock, 1000);
</script>

</body>
</html>
